services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-swarmforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swarmforge}
      POSTGRES_DB: ${POSTGRES_DB:-swarmforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swarmforge}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - swarmforge

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - swarmforge

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - swarmforge

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-swarmforge}:${POSTGRES_PASSWORD:-swarmforge}@postgres:5432/${POSTGRES_DB:-swarmforge}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-swarmforge}:${POSTGRES_PASSWORD:-swarmforge}@postgres:5432/${POSTGRES_DB:-swarmforge}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LITELLM_PROXY_URL: http://litellm:4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - swarmforge

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-swarmforge}:${POSTGRES_PASSWORD:-swarmforge}@postgres:5432/${POSTGRES_DB:-swarmforge}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-swarmforge}:${POSTGRES_PASSWORD:-swarmforge}@postgres:5432/${POSTGRES_DB:-swarmforge}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LITELLM_PROXY_URL: http://litellm:4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - swarmforge

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_WS_URL: ""
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - swarmforge

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 64m
    networks:
      - swarmforge

volumes:
  postgres_data:
  redis_data:

networks:
  swarmforge:
    driver: bridge
